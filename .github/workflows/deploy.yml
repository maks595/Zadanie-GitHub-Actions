name: Deploy Application

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image (Native)
        run: |
          echo "Budowanie obrazu kontenera na produkcji..."
          docker build -t django-app:latest .

      - name: Docker Push & Deploy (GitHub Secrets)
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "Logowanie do rejestru kontenerów..."
          echo "Wdrażanie nowej wersji aplikacji na serwer..."
          echo "Deploy zakończony pełnym sukcesem!"